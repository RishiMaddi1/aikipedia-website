<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aikipedia – AI Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700|Fira+Mono&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <style>
    /* Your existing styles... */
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="model-selector">
        <h2>Select Model</h2>
        <div class="model-option selected" data-model="qwen/qwen-2.5-coder-32b-instruct">
          <div class="model-name">Qwen-2.5-Coder</div>
          <div class="model-description">Specialized in code generation and technical discussions</div>
        </div>
        <div class="model-option" data-model="google/gemini-2.5-flash">
          <div class="model-name">Gemini</div>
          <div class="model-description">Fast and versatile for general conversations</div>
        </div>
      </div>
    </aside>
    <main class="main">
      <div class="chat-container" id="chatContainer"></div>
      <div class="input-container">
        <form class="input-form" id="chatForm">
          <textarea
            placeholder="Type your message here..."
            id="userInput"
            required
          ></textarea>
          <button type="submit" id="sendButton">Send</button>
        </form>
      </div>
    </main>
  </div>

  <script>
    const chatContainer = document.getElementById('chatContainer');
    const chatForm = document.getElementById('chatForm');
    const userInput = document.getElementById('userInput');
    const sendButton = document.getElementById('sendButton');
    const modelOptions = document.querySelectorAll('.model-option');
    let selectedModel = 'qwen/qwen-2.5-coder-32b-instruct'; // Default selected model
    let chatHistory = [];

    // Handle model selection
    modelOptions.forEach(option => {
      option.addEventListener('click', () => {
        modelOptions.forEach(opt => opt.classList.remove('selected'));
        option.classList.add('selected');
        selectedModel = option.dataset.model;
      });
    });

    // Handle chat form submission
    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = userInput.value.trim();
      if (!message) return;

      // Disable input while processing
      userInput.disabled = true;
      sendButton.disabled = true;

      // Add user message to chat
      addMessage('user', message);
      userInput.value = '';

      try {
        const response = await fetch('https://backend.aikipedia.workers.dev/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            model: selectedModel,
            history: chatHistory
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Unknown error');
        }

        // Add assistant's response to chat
        addMessage('assistant', data.response);

        // Update chat history
        chatHistory.push(
          { role: 'user', content: message },
          { role: 'assistant', content: data.response }
        );

      } catch (error) {
        addMessage('assistant', `Error: ${error.message}`);
      } finally {
        // Re-enable input
        userInput.disabled = false;
        sendButton.disabled = false;
        userInput.focus();
      }
    });

    function addMessage(role, content) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;

      // Convert markdown to HTML and handle code blocks
      const html = marked.parse(content, {
        highlight: function(code, lang) {
          // Highlighting logic here...
        }
      });

      messageDiv.innerHTML = html;

      // Append message to chat container
      chatContainer.appendChild(messageDiv);

      // Scroll to bottom after adding message
      chatContainer.scrollTo({
        top: chatContainer.scrollHeight,
        behavior: 'smooth'
      });
    }

    // Auto-resize textarea
    userInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });
  </script>
</body>
</html>
