<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aikipedia – AI Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700|Fira+Mono&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  
  <style>
    :root {
      --bg-primary: #1a1b26;
      --bg-secondary: #24283b;
      --text-primary: #a9b1d6;
      --text-secondary: #9aa5ce;
      --accent-primary: #7aa2f7;
      --accent-secondary: #bb9af7;
      --border-color: #414868;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-primary);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      line-height: 1.6;
    }

    .container {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--bg-secondary);
      padding: 1.5rem;
      border-right: 1px solid var(--border-color);
    }

    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
    }

    .input-container {
      border-top: 1px solid var(--border-color);
      padding: 1.5rem;
      background: var(--bg-secondary);
    }

    .model-selector {
      margin-bottom: 2rem;
    }

    .model-selector h2 {
      color: var(--accent-primary);
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }

    .model-option {
      padding: 1rem;
      margin-bottom: 0.5rem;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .model-option:hover {
      border-color: var(--accent-primary);
    }

    .model-option.selected {
      border-color: var(--accent-primary);
      background: rgba(122, 162, 247, 0.1);
    }

    .model-name {
      color: var(--text-primary);
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .model-description {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .message {
      margin-bottom: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      max-width: 75%;
      word-wrap: break-word;
    }

    .message.user {
      background: var(--bg-secondary);
      align-self: flex-end;
    }

    .message.assistant {
      background: rgba(122, 162, 247, 0.1);
      align-self: flex-start;
    }

    .message pre {
      background: var(--bg-secondary);
      border-radius: 6px;
      padding: 1rem;
      margin: 0.5rem 0;
      overflow-x: auto;
    }

    .message code {
      font-family: 'Fira Mono', monospace;
    }

    .input-form {
      display: flex;
      gap: 1rem;
    }

    .input-form textarea {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 1rem;
      font-family: inherit;
      font-size: 1rem;
      resize: none; /* Prevent manual resizing */
      height: 60px;
      max-height: 150px; /* Max height limit */
      transition: all 0.2s;
    }

    /* Optional: When content overflows, ensure it's scrollable instead of expanding */
    .input-form textarea:focus {
      overflow-y: auto; /* Allow scroll when the content exceeds the max-height */
    }

    .input-form textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .input-form button {
      background: var(--accent-primary);
      color: var(--bg-primary);
      border: none;
      border-radius: 8px;
      padding: 0 1.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .input-form button:hover {
      background: var(--accent-secondary);
    }

    .input-form button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Markdown Styles */
    .message p {
      margin: 0.5rem 0;
    }

    .message h1, .message h2, .message h3 {
      color: var(--accent-primary);
      margin: 1rem 0 0.5rem 0;
    }

    .message ul, .message ol {
      margin: 0.5rem 0;
      padding-left: 1.5rem;
    }

    .message blockquote {
      border-left: 3px solid var(--accent-primary);
      margin: 1rem 0;
      padding-left: 1rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="model-selector">
        <h2>Select Model</h2>
        <div class="model-option selected" data-model="qwen/qwen-2.5-coder-32b-instruct">
          <div class="model-name">Qwen</div>
          <div class="model-description">Specialized in code generation and technical discussions</div>
        </div>
        <div class="model-option" data-model="google/gemini-2.5-flash-preview">
          <div class="model-name">Gemini</div>
          <div class="model-description">Fast and versatile for general conversations</div>
        </div>
      </div>
    </aside>
    <main class="main">
      <div class="chat-container" id="chatContainer"></div>
      <div class="input-container">
        <form class="input-form" id="chatForm">
          <textarea
            placeholder="Type your message here..."
            id="userInput"
            required
          ></textarea>
          <button type="submit" id="sendButton">Send</button>
        </form>
      </div>
    </main>
  </div>

  <script>
    const chatContainer = document.getElementById('chatContainer');
    const chatForm = document.getElementById('chatForm');
    const userInput = document.getElementById('userInput');
    const sendButton = document.getElementById('sendButton');
    const modelOptions = document.querySelectorAll('.model-option');
    let selectedModel = 'qwen/qwen-2.5-coder-32b-instruct';  // Default selected model
    let chatHistory = [];

    // Handle model selection
    modelOptions.forEach(option => {
      option.addEventListener('click', () => {
        modelOptions.forEach(opt => opt.classList.remove('selected'));
        option.classList.add('selected');
        selectedModel = option.dataset.model;
      });
    });

    // Handle chat form submission
    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = userInput.value.trim();
      if (!message) return;

      // Disable input while processing
      userInput.disabled = true;
      sendButton.disabled = true;

      // Add user message to chat
      addMessage('user', message);
      userInput.value = '';

      try {
        const response = await fetch('https://backend.aikipedia.workers.dev/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            model: selectedModel,
            history: chatHistory
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Unknown error');
        }

        // Add assistant's response to chat
        addMessage('assistant', data.response);

        // Update chat history
        chatHistory.push(
          { role: 'user', content: message },
          { role: 'assistant', content: data.response }
        );

      } catch (error) {
        addMessage('assistant', `Error: ${error.message}`);
      } finally {
        // Re-enable input
        userInput.disabled = false;
        sendButton.disabled = false;
        userInput.focus();
      }
    });

    function addMessage(role, content) {
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message', role);
      const messageContent = document.createElement('p');
      messageContent.innerHTML = marked(content);  // Convert Markdown to HTML
      messageDiv.appendChild(messageContent);
      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;  // Scroll to the bottom
    }

    // Focus on input when clicking inside the input area
    userInput.addEventListener('focus', () => {
      userInput.style.height = 'auto';
    });

    userInput.addEventListener('input', () => {
      // Handle auto resizing of the input area
      if (userInput.scrollHeight > userInput.clientHeight) {
        userInput.style.height = `${userInput.scrollHeight}px`;
      }
    });
  </script>
</body>
</html>
