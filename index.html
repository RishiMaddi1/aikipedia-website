<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Aikipedia Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
      :root {
        --bg: #1A120B;
        --bg-secondary: #3C2A21;
        --text: #E5E5CB;
        --accent: #D5CEA3;
        --border: #3a3a3a;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        display: flex;
        font-size: 1.1rem;
      }

      .sidebar {
        width: 7rem;
        background: var(--bg-secondary);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1.2rem 0;
        transition: width 0.3s ease;
        font-size: 1.1rem;
      }

      .sidebar.expanded {
        width: 260px;
        align-items: flex-start;
        padding-left: 1.2rem;
      }

      .profile {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background-color: var(--accent);
        margin-bottom: 1.5rem;
        cursor: pointer;
      }

      .profile-details {
        display: none;
        margin-top: 1rem;
        font-size: 2rem;
      }

      .sidebar.expanded .profile-details {
        display: block;
        color: var(--text);
        font-weight: 600;
      }

      .model-selector-container {
        display: none;
        flex-direction: column;
        gap: 1.2rem;
        margin-top: 2rem;
        width: 100%;
        padding-right: 1rem;
      }

      .sidebar.expanded .model-selector-container {
        display: flex;
      }

      .model-selector-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        width: 100%;
        height: 120px;
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 10px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .model-selector-box:hover {
        background-color: var(--bg-secondary);
      }

      .model-selector-box.selected {
        background-color: var(--accent);
        color: #000;
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .chat-area {
        flex: 1;
        padding: 3rem 8rem 3rem 8rem ;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      

      .message {
        max-width: 80%;
        padding: 1.2rem 1.4rem;
        border-radius: 12px;
        word-wrap: break-word;
        line-height: 1.6;
        border-radius: 16px;
      }

      .message.user {
        align-self: flex-end;
        background: var(--accent);
        color: #000;
      }

      .message.assistant {
        align-self: flex-start;
        background: var(--bg-secondary);
      }

      .input-area {
        display: flex;
        gap: 1rem;
        border-top: 1px solid var(--border);
        background: var(--bg-secondary);
        padding: 1.2rem;
        align-items: center;
        font-size: 1.1rem;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }

      .input-area textarea {
        flex: 1;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
        font-size: 1.1rem;
        resize: none;
        height: 64px;
        border-radius: 14px;
      }

      .input-area button,
      .input-area select {
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 10px;
        padding: 0.8rem 1.2rem;
        font-size: 1.1rem;
        cursor: pointer;
        border-radius: 14px;
      }

      .input-area button:disabled {
        background: #555;
        cursor: not-allowed;
      }

      .loading {
        align-self: flex-start;
        background: var(--bg-secondary);
        padding: 1.2rem;
        border-radius: 10px;
        font-family: monospace;
        color: #aaa;
        max-width: 70%;
        font-size: 1.2rem;
        border-radius: 14px;
      }

      .loading span {
        display: inline-block;
        animation: blink 1s infinite steps(1);
      }

      .loading span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .loading span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes blink {
        0% {
          opacity: 0.2;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.2;
        }
      }

      .header {
        background: var(--bg);
        color: var(--accent);
        font-size: 3.2rem;
        font-weight: 600;
        padding: 1rem 2rem;
      }

      .input-wrapper {
        width: 100%;
        display: flex;
        justify-content: center;
        padding: 0 2rem 2rem;
        background: var(--bg);
      }

      .input-area {
        max-width: 900px;
        width: 100%;
        border-radius: 16px;
        background: var(--bg-secondary);
      }
      .usage-stats {
        margin-top: -1rem;
        padding: 0.5rem 1rem;
        color: #aaa;
        font-size: 0.8rem;
        border-top: 1px solid var(--border);
        text-align: right;
     }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="profile" id="profileToggle"></div>
      <div class="profile-details">Hello, Maddi</div>

      <!-- Model Selector Section -->
      <div class="model-selector-container" id="modelSelectorContainer">
        <div class="model-selector-box" data-model="qwen/qwen-2.5-coder-32b-instruct">
          <h1>Qwen</h1>
          <br />
          <p>Advanced Coding Capabilities</p>
        </div>
        <div class="model-selector-box" data-model="google/gemini-2.5-flash-preview">
          <h1>Gemini</h1>
          <br />
          <p>Best For Reasoning Tasks</p>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="header">
        Aikipedia
      </div>
      <div class="chat-area" id="chatContainer"></div>
      <div class="input-wrapper">
        <form class="input-area" id="chatForm">
          <textarea id="userInput" placeholder="Type your message..." required></textarea>
          <button id="sendButton" type="submit">Send</button>
        </form>
      </div>
    </main>

    <script>
      const chatContainer = document.getElementById("chatContainer");
      const chatForm = document.getElementById("chatForm");
      const userInput = document.getElementById("userInput");
      const sendButton = document.getElementById("sendButton");

      const profileToggle = document.getElementById("profileToggle");
      const sidebar = document.getElementById("sidebar");
      const modelSelectorBoxes = document.querySelectorAll(".model-selector-box");

      let chatHistory = [];

      profileToggle.addEventListener("click", () => {
        sidebar.classList.toggle("expanded");
      });

      modelSelectorBoxes[0].classList.add("selected");

      modelSelectorBoxes.forEach((box) => {
        box.addEventListener("click", () => {
          modelSelectorBoxes.forEach((otherBox) => otherBox.classList.remove("selected"));
          box.classList.add("selected");
        });
      });

      chatForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = userInput.value.trim();
        if (!message) return;

        const selectedModelBox = document.querySelector(".model-selector-box.selected");
        const model = selectedModelBox ? selectedModelBox.dataset.model : "qwen/qwen-2.5-coder-32b-instruct";

        addMessage("user", message);
        userInput.value = "";
        userInput.disabled = true;
        sendButton.disabled = true;

        const loadingDiv = document.createElement("div");
        loadingDiv.className = "loading";
        loadingDiv.innerHTML = "<span>.</span><span>.</span><span>.</span>";
        chatContainer.appendChild(loadingDiv);
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: "smooth" });

        try {
          const res = await fetch("https://backend.aikipedia.workers.dev/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message, model, history: chatHistory }),
          });

          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Something went wrong");

          loadingDiv.remove();
          addMessage("assistant", data.response);
          chatHistory.push({ role: "user", content: message }, { role: "assistant", content: data.response });
        } catch (err) {
          loadingDiv.remove();
          addMessage("assistant", "❌ " + err.message);
        } finally {
          userInput.disabled = false;
          sendButton.disabled = false;
        }
      });
      // In your chat response handling:
addMessage('assistant', data.response);
displayCreditUsage(data.usage); // New function to show usage stats

function displayCreditUsage(usage) {
  const usageDiv = document.createElement('div');
  usageDiv.className = 'usage-stats';
  usageDiv.innerHTML = `
    <small>Tokens: ${usage.input_tokens} in / ${usage.output_tokens} out</small>
    <small>Cost: ${usage.cost.toFixed(4)} credits</small>
    <small>Remaining: ${usage.remaining_credits.toFixed(4)}</small>
  `;
  chatContainer.appendChild(usageDiv);
}
      function addMessage(role, text) {
    const messageDiv = document.createElement("div");
    messageDiv.className = `message ${role}`;

    if (role === "assistant") {
        // Preprocess text to ensure proper math delimiters
        let processedText = text
            // Fix single-line equations
            .replace(/(^|\s)\$([^$]+)\$($|\s)/g, '$1$$$2$$$3')
            // Fix multi-line equations
            .replace(/\\begin{equation}([\s\S]*?)\\end{equation}/g, '$$$1$$')
            // Fix display-style \[ \]
            .replace(/\\\[([\s\S]*?)\\\]/g, '$$$1$$');

        // Parse with marked
        messageDiv.innerHTML = marked.parse(processedText, {
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            }
        });

        // Render math with KaTeX
        setTimeout(() => {
            renderMathInElement(messageDiv, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false}
                ],
                throwOnError: false
            });

            // Apply syntax highlighting
            document.querySelectorAll('pre code').forEach(hljs.highlightElement);
        }, 10);
    } else {
        messageDiv.textContent = text;
    }

    chatContainer.appendChild(messageDiv);
    chatContainer.scrollTo({top: chatContainer.scrollHeight, behavior: "smooth"});
}

    </script>
  </body>
</html>
